body:
  text: 兔園策府卷第一兔園策府卷第一并序杜嗣先奉教撰易曰利用於賓王書曰明試以功議事以制斯則升賢之大執辨政之嘉謀採其奧則薪楢之詠興選其精則桂林之響發自周徵造士漢辟賢良擢高第以登庸懸甲科而入仕劉君詔問吐河洛之詞仲舒抗答引陰陽之義孫弘則約文而切理杜欽則指事以陳謀魯丕以雃素申規馬融以儒宗獻可斯乃對問之大體詢考之良圖求之者期於濟時言之者期於適務使文不滯理理必會文削諛論以正辭剪浮言而體要非夫宏才博古達政通機無以登入室之科徒用踐高門之地自魏晉以後藻麗漸繁齊梁以還文華競軼構虛詞而設巧穿異辨以邀能文皆理外之言理失文中之意將陳正道掩巢燧於毫端欲敘升平擯唐虞於字末境才臻於九服遠述幽冥之荒德未靜於一戎先動雲雷之氣奏諛言而竊位假繁論以豐詞匪窮理之大猷乖得賢之雃訓大唐奮庸庶績翼亮鴻基拂蓮兆於滋川納蘭圖於榮浦淹中碩藝並列三雍之官平府遺編咸歸七門之史執禹麾而進善坐堯衢以訪賢故事則南宮之賓待詔則東館之客秀異之薦並躡長途之龍孝廉之徵俱振充庭之鷺故得能官同於濟巨多士茂於基邦草澤無遺英奇必進伏惟大王分華星樹育慶雲柯固磐石以開基列維城而作鎮中山文梓獨振蟠龍之詞淮岫芳叢先警麚之韻立奏金箱之典停日轡於昆吾坐丹轂之篇下月輪於清夜驂駕駟馬禮盛於從梁面試銅臺文高於入魏東平蒼之雃望北海靖之英聲湛楚醞於芳筵飾燕金於駿骨由是徐陳並列沐鳧沼以趨歡牧馬爭歸望鴻臺而漸翼顧惟虛賤謬奉恩光昔因耕鑿之勤頗覽詩書之訓登學山而覆簣鼓文河以濫觴爰從羈貫之年肇應揚庭之問以茲下隸來陪上藩暫赴長裾之門更對修篁之苑璿灰屢變緹襲空珍忝遊梁之一班同背淮之千里忽垂恩教令修新策今乃勒成一部名曰兔園策府並引經史為之訓注雖則謬言斐論無取貴於緗紬然而野識芻詞理難周於翰墨傳之君子有慚安國之言懸之市人深乖呂韋之旨所定篇目題之如左兔園策府卷第一辨天地正曆數議封禪征東夷均州壤辨天地問氣象初構形質始萌倚杵分高下之容迥輪表運行之數然則駕雲甄海鍊石補維徒聞夸父之林空紀大章之算至若玄黃定體珠璧連暉列九野於躔房疏五潢於清淺窺其正色有惑於蒙莊覽其要終多疑於鄭灶子既獵華雕篆採懿緗紬對宵景以馳芳概秋旻而發譽登科入辟必俟英賢賾祕鉤深理宜昭晰對竊以玄儀未闢九變混其萌芽素質爰分四遊定其升降然則十端虛廓九道交迥仰之者莫測其源言之者罕詳其要或明其載水或說以浮空地若卵中之黃天如山外之色楊泉覆繖之諭未窮廣大之容仲任倚蓋之談距識周流之象當今握璿衡而臨極運玉斗以司辰上括乾象旁吞地絡陽光抱珥陰彩重輪星披五老之圖雪映四神之轍抗天臺於南極闢玄殿於北荒東逾抃鼇之壑西越繞蛇之丘珠囊靡失玉燭咸調傃風律以來庭皓雲歌而入贄猶復窮精四術覽奧三家欲明甄曜之篇思聞考靈之說旁羅大象側訪庸才雖異談天聊陳管見夫以玄黃質判偃伏形殊元氣輕而上騰陰氣凝而下薄方之若火則煙揚而灰沉譬之若舟則外行而內靜天綱既位坤道方成八極以之肇分五材因而並運至若曦光散彩稟陽氣以成形娥魄凝暉感陰靈而為質星昭白榆之影憑於萬物之精河疏析木之津假以百川之氣至若金臺混極靈山降英鏤芳桂以飛輪拂若華而逗景真人負笈遠造天關海客乘查遙依星渚補維立極化杖成林理懵探賾之端事隱名言之際嗽乳遊鈞之說唯聞託夢之人懸鉤破鏡之談空傳掞詞之客夫以東遊天縱終迷對日之言西蜀含章竟詘蓋天之論前賢往哲猶且為疑後學庸能良難備述謹對正曆數問出震開元皇雄標合緯之首繞樞提象容成著命曆之初五德遞遷三微驟變寅餞之職分散於疇人如淳曰家業世世相傳為疇律年二十三傅之疇官各從其父學吐納之儀參差於銅史陸倕新刻漏銘曰耳不輟音眼無流盼銅使司刻金徒抱箭也月弦日繞之法課校而難詳漢書律曆志曰漢初綱紀大基以張蒼言用顓頊曆然朔晦月見弦望滿虧多非是洛下陵渠之言推尋而罕就漢書律曆志曰願募治曆者以造漢太初曆乃選治曆鄧平及酒泉侯方士唐都洛下閎都分天部而閎運算復使校曆宦者復核太初曆晦朔弦望皆最密日月如連璧五星若連珠陵渠奏狀遂用鄧平曆以平為太史丞者也今欲別徵杓建改正攝提漢書律曆志曰玉衡杓建天之綱也如淳曰杓音標斗端星又曰三苗亂德孟陬殄滅攝提失方注曰月正為孟陬閏餘乖錯不與正歲值謂之殄滅攝提星名隨斗杓所指若誤三月當指辰而乃指巳是為失方也必使璧彩交纏珠光叶緯漢書律曆志云日月初躔月星之紀云躔舍珠光璧彩並在上文登臺候朔瞻五雲而不差入幕窺灰應四氣而無爽春秋傳曰辛亥朔日南至公既登觀臺以望而書禮也凡分至啓閉必書雲物為備故也五雲謂五色物雲氣也續漢書律曆志曰候氣之法為望室三重塗釁必周密布緹幔室中以木為案每律各一內卑外高從其方位加律其上以葭灰抑其內案律而候之氣至者灰去其為氣動者灰散人與外風動者其灰聚四氣春夏秋冬陸倕新刻漏銘序曰察四氣之盈虛課六曆之疏密也欲致斯道有懵其由論語道之將行也與命也謝莊月賦曰眛道懵學也宜陳推步之方以廣詢求之路漢書律曆志曰推日月元統許慎說文解字歲從步戌聲謂推步以成一歲毛詩詢於芻蕘尚書傳曰求諸野得之於傅巖之溪也對竊以立天立地四遊與六氣交馳易曰立天之道曰陰與陽立地之道曰柔與剛四遊事注訖春秋傳曰天有六氣杜君注云六氣謂陰陽風雨晦明之謂也為帝為王五德與三微遞運孝經三五圖曰五帝起寅畢午三五從未至酉白虎通曰夏以建寅為正殷以建丑為正周以建子為正謂之三微前已注訖五德亦注訖若不精窮數象推步陰陽則龍蛇有有易度之妖水火成相沴之變春秋傳曰物生而後有象象而後有滋滋而後有數推注訖左氏傳曰歲在星紀而淫於玄枵杜云星紀在丑斗牛之次玄枵在子虛危之次又曰蛇乘龍杜云蛇玄武之宿歲星為青龍失次在虛危下為蛇所乘也漢書五行志曰時則有草夭時則有螺蟲之孽時則有羊禍時則有目痾時則有赤萌赤祥惟水沴火注云沴音麗由是黃神馭宇既命曆於容成丹陵膺圖亦欽象於羲仲孔子家語黃帝死三百年人畏其神容成造曆已注訖帝王世紀堯生於丹陵乃命羲和欽若昊天曆象日月星辰敬授人時尚書中侯曰舜祇德欽象習堯祇位也自疇人輟務日御廢官胤后承亂紀之誅齊詩興倒裳之刺疇人已注訖春秋傳曰冬十月朔日有食之不書日官失之也天子有日官諸侯有日御羲和廢時亂日出尚書文毛詩序曰東方未明刺無節也契壺氏不能掌職焉東方未明顛倒衣裳注云契壺氏失漏刻之節東方未明而以為明故群臣促遽顛倒衣裳也端餘莫辨晦朔不分九章之要罕傳六曆之流競作春秋傳曰先王之正時也履端於始舉正於中歸餘於終漢書律曆志曰周武王訪箕子箕子言大法九章而五紀明曆法又曰有黃帝顓頊夏殷周及魯曆以張蒼言用顓頊曆比於六曆疏闊中最為微近也遂使張蒼首制尚興壺遂之言鄧平創規猶煩壽王之奏漢書律曆志曰元封柒年太中大夫公孫卿壺遂太史公司馬遷等言曆紀廢壞宜改正朔又云陵渠奏用鄧平曆元鳳三年太史公張壽王上書言曆者天地之大紀今陰陽不調更曆之過詔下詰問壽王不伏也聖上以欽明履運曆數在躬踐異承基函元孕象書曰放勛欽明帝堯足履翼注在禮樂策中漢書律曆志曰太極之氣函三為一注云元氣起於子未分之時天地人混合為一也帝德崇矣天文粲然故得珠緯編囊璿光豔燭尚書曰帝德廣運五星合度謂之珠囊已注訖尚書曰在璿璣玉衡注璿美玉綵雲垂慶溽露懸甘宋書曰南昌戊午午時天氣清明有綵雲映覆郡邑甘露白雲降史記天官書曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲一名慶雲莊子曰乘彼白雲至于帝鄉淮南子曰昔太清之治代天覆以德地載以樂而甘露下也蓂薦影於宵輪條輟響於風緒帝王世紀曰蓂莢者瑞草也月朔日生一莢十五日生十五莢十六日落一莢及晦而盡若月小則餘一莢厭而不落聖者以是占日月之數故名曆莢堯時蓂階而隨月生死王充論衡曰王者太平時則五日一風風不鳴條十日一雨雨不破塊楚詞曰哀秋冬之緒風也若乃統三正播六虛翠媯浮籙之祥黃樞降靈之運白虎通問夏以建寅為正殷以建丑為正周以建子為正故曰三正漢書律曆志曰天施地化人事是為三統其於三正也黃鍾為天正林鍾為地正太簇為人正又曰易大衍之數五十其用四十有九成陽六爻得周流六虛之象也河圖挺佐輔曰黃帝持齊七日七夜天老五聖皆從以遊於河洛之間至見於翠媯之淵大鱸魚折流而至顧問五聖皆曰莫見獨與天老迎之五色果魚泛帛圖蘭葉朱文以授黃帝中央帝含樞事已注訖春秋運斗樞曰帝舜祇于德榮光休至黃龍負卷圖置舜前四合而連戶宋均注曰含樞之使也四合有道相入類有戶言可開閉也事亦見尚書中侯固可漂蕩馳驟之跡陶甄巢燧之初揚雄美新曰流虞滌殷蕩周白虎通曰三皇步五帝驟三王馳五霸騖韓子曰有巢氏以虺蛇害人構木巢其上而人悅之故稱有巢氏河書曰昔有巢氏駕飛鱗從日月禮含文嘉曰遂人氏鑽木取火炊生為熟全無腹疾遂天之意故云遂人氏典略曰燧人氏教鑽燧取火故免腥臊所以稱之遂人氏也猶復發斂陰陽宣考天地窮十端之升降核五紀之循環漢書律曆志曰黃帝察發斂定清濁也孟康曰春夏為發秋冬為斂清濁聲之清濁也又曰倪寬與博士等曰陛下宣考天地為萬世則春秋繁露天有十端注訖尚書洪範曰四用五紀若使懸炭窺衡瞻緹侯管淮南子曰懸土炭於衡夏至濕故炭重冬至燥故炭輕亦見漢書之文明推三乘十之變得損一會九之宜推三事已注訖漢書律曆志曰以五乘十大衍之數也漢書律曆志曰黃鍾三分損一下生林鍾三分林鍾益一上生太簇三分太簇損一下生南呂參分南呂益一上生姑洗陰陽相生自黃鍾始其法皆用銅又曰易三天九兩地十是為會數九會而復元注云謂四千六百一十七歲之月數也所謂元月也然後刻箭金壺回杓玉斗正太初之曆窮大衍之數陸平原漏刻賦曰挈金壺以南羅潛幽水而北戢伏陰蟲以承波吞恆流其如挹杓斗也唐都獻法採之而勿遺劉氏定譜存之而取則唐都洛下宏校曆事已注訖漢書律曆志曰孝成世劉向總六曆作五紀論向子歆究其微妙作三統曆及譜也自然清臺有準黃道無差珠璧連七曜之文金木叶五行之次謹對漢書律曆志曰大司農中丞霍光等草餘人與丞相御史大夫軍史各一人雜侯上林清臺課諸曆疏密凡十一家黃道注訖日月五星謂之七耀家語季康子問孔子五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行金木水火土分時化育以成萬物其神謂之五帝佐天理物者也古之王者易代改號取法五行五行始終相生亦象其義議封禪問省方戒典升中紀號周易觀卦象曰風行地上觀先王以省方觀人設教禮記曰昔者先王尚有德尊有道舉賢而置之舉衆而誓之是故因天以事天因地以事地因名山升中於天鄭玄注曰升上也中猶成也謂至方嶽焚柴祭天以號諸侯之成功也逖聽前古空覽夷吾之詞司馬相如封禪書曰率邇者踵武逖聽者風聲史記曰齊桓公欲封禪管仲夷吾曰古者封太山禪梁甫者七十二家夷吾所記十有二焉昔者無懷氏封太山禪云云伏羲神農炎帝封太山禪云云黃帝封太山禪云云顓頊帝嚳堯舜封太山禪云云禹封太山禪會稽湯封太山禪云云周成王封太山禪社首古之封禪鄗上之黍北里之禾所以為盛注云鄗音臛江河淮之間一茅三脊所以為籍也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳳凰麒麟不至嘉禾不生而欲封禪無乃不可乎於是桓公乃止封禪書曰逖聽者風聲也發揮中葉唯傳茂陵之札易曰發揮剛柔而生爻漢書曰司馬相如著書茂陵又曰長卿未死時為一卷書曰有使來取書奏之其遺札書云封禪事然則君臨大寶駕馭黎元易曰天地之大德曰生聖人之大寶曰位司馬相如封禪書曰授厚福以浸黎元混車書而總八方會玉帛而朝萬國干寶晉紀總論曰太康之中天下書同文車同軌牛馬被野餘糧栖畝史記曰禹會諸侯於塗山執玉帛者萬國也莫不崇大禮登介丘禮記曰大禮與天地同節司馬相如封禪書曰蓋周躍魚隕航休之以燎微夫斯之為符也以登介丘不亦恧乎注云介大也鑾移駕象之巖蓋轉常龍之岫崔豹古今注曰輅衡上朱鳥口銜鈴鈴謂和鑾也或謂朱鳥鸞鳥也鸞銜鈴故謂之鸞今或為鑾事一而義異墨子曰黃帝合鬼神於太山駕象車六蛟龍封禪書曰意者太山梁甫設壇場望華蓋龍魚河圖曰東方太山府君神姓圖名常龍南方霍山府君神姓舟名靈峙西方華陰山府君神姓結名鬱佇北方恆山府君神姓登名僧中央嵩高山府君神姓壽名逸群呼之令人不病耳當今風淳化洽道穆時雍方欲肅彩仙閭揚徽日觀漢書曰武帝東巡海上夏四月還修封太山禪石閭應劭曰石閭山在太山下趾南方方士言仙人閭也應劭漢官儀曰太山東南巖名日觀日觀者雞鳴時見日玄虯警路蒼龍順時張平子東京賦曰六玄虯之奕奕齊騰驤以沛艾禮記月令曰孟春之月天子居青陽左介乘鸞輅駕蒼龍載青旌衣青衣也班瑞諸侯告成山嶽尚書曰既月乃日覲肆嶽群牧班瑞於群后注班還瑞謂圭璧漢書武帝紀曰登封太山注云王者功成治定告成功於天封崇也助天之高也刻石紀號有金策石函金泥玉檢之封焉也討論圖籍須叶禮經當陳摛掞之詞用補飛英之略尚書序曰討論墳典左太沖蜀都賦曰王褒韡曄而秀發揚雄含章而挺生幽思絢道德摛藻談天庭司馬相如封禪書曰飛英聲騰茂實也對竊聞肆覲群后俯曦觀以時巡尚書曰五年一巡狩也群后四朝曦日也日觀已注訖時巡者二月東巡狩五月南巡狩八月西巡狩十一月北巡狩也告成方嶽陵天樞而紀號告成方嶽注訖樞門也王嬰古今通論曰太山一名天門是知探玉策結金繩應劭風俗通曰岱宗上有金篋玉策能知人年壽修短武帝探策得十八因倒讀之曰八十案岱宗封者立碑高一丈二尺金泥銀繩印之以璽也蒲駕登丘芝泥封檢漢書郊祀志曰秦始皇即位三年東巡狩郡縣於是徵齊魯之儒生博士七十人至于太山下諸儒生或議曰古者封禪為蒲車惡傷山上之草木也掃地祭焉言其易遵也運斗樞曰舜東巡狩黃龍五采負圖以黃玉為匣白玉為樞金繩黃芝泥兩端中有七十二帝地形之制天文宮位分度之差者眇觀列辟擬議者多人逖覽前王成功者罕就封禪書曰歷選列辟以迄于秦易曰擬之而後言議之而後動也良以政途未廣天位猶艱書曰天位艱哉徒想宏儀空陳大禮由是齊桓有問恥符瑞之未臻秦帝將升因風雨之為弊齊桓公注訖漢書郊祀志曰秦始皇三年東巡自上太山立石頌始皇德從陰道下禪於梁甫始皇之上太山中阪遇暴風雨休於太山大樹下儒遇而便譏之也雖復仁翔濟鳳覽張奏以為疑范曄後漢書曰光武初生於濟陽有鳳凰集又曰張純字伯仁為大司空奏上議封禪詔不納至建武三十年又奏曰自古受命為帝必有封禪以告成功今攝提之歲宜及嘉時遵唐帝之典帝乃東巡以純從并上元封舊儀及刻石文也運啓譙龍對蔣書而流汗魏志曰永康元年黃龍見譙太史令單揚曰後當有王者興不及五十年亦當復見天事恆象此其應也內黃殷登默而記之至延康元年三月又見譙登聞之曰揚之言驗乎魏書曰護軍蔣濟上封禪曰自古革命受符未有不蹈梁甫登太山者魏振百王之弊成天地之道上天報應嘉瑞茂祥比古寧逾此儀久廢宜下公卿廣撰其禮詔曰聞濟此言使吾汗出流足我國家之創曆也尚書曰曆數在爾躬統天正紐地鈐春秋曰夏正得天統班固典引曰高光二聖蓋以膺玄天之正統受堯讓之歸運符瑞圖曰地鈐者不振搖也孝經援神契曰神靈滋液百珍寶用則地鈕鈐宋均注曰鈐帶駕昊騰英飛軒踐籙帝王世紀曰少昊金王氏黃帝子姬姓是為玄囂有鳳凰之瑞以鳥記官又曰昔軒氏之一為熊氏姬姓有景雲之瑞以雲記官御龍圖而承景命握麟璽而總禎符孫氏瑞應圖曰帝堯即位坐於河渚之濱神龍赤色負圖而至備載山澤河海之形國之分域晉中興書曰元帝建武元年江寧人虞迪得白玉麒麟璽一紐以獻文曰長壽萬年班固典引曰逢運丁辰景命聲陶混氣之鄉教漸無明之國遁甲開山圖曰南溟之山金堂玉室無上混氣實神化張平子思玄賦曰經石密之暗野不識蹤之所由又楚詞曰日安不到燭龍何照注云言天之西北有幽冥無日之國有龍銜燭而照之者朗三光於乾蓋飛五色於雲柯三光日月星班固典引曰經緯乾坤出入三光文子以天為蓋以地為車四時為馬陰陽為騶京房易飛侯四方常有大雲五色具而不雨其下有賢人隱陸平原浮雲賦曰金柯玉葉也麥驚馴素之翬蘆引翻珠之鴈爾雅曰伊洛而南素質五彩成章曰翬雉潘安仁射雉賦曰麥纖纖以擢芒雉鷕鷕而朝雊後漢書曰魯恭為中牟令雉馴桑下史記曰周成王時越裳重譯來貢白雉崔豹古今注曰鴈自北度江南瘦瘠能高飛不畏繒繳江南沃饒每至還河北體肥不能高飛恐為人所獲常銜蘆長數寸以防繒繳淮南子曰鴈從風而飛愛其力銜蘆翔備繒繳也漢書曰太始三年行幸東海獲赤鴈作歌曰赤鴈集五色采榮漪湛潤膏露凝華尚書中侯曰堯沉璧於河榮出光鄭玄曰榮光五色從中出毛詩曰河水清且漣漪干寶正言曰河榮清聖人出里社鳴聖人生漢書曰河潤九里符瑞圖曰甘露者一名膏露鶚冠子曰聖人之德上及太清下及太寧中及萬物則膏露降之鳳棲雙植之桐龍遊五花之樹淮南子曰鳳皇非梧桐不栖非竹實不食魏文帝詩曰雙桐生空井孫氏瑞應圖曰君子在位則神龍見括地圖曰龍池山有池方七百里群龍居之多五花樹龍恆食之也仁犧薦骼瑞鰈呈鱗春秋注曰麟者仁獸司馬相如封禪書曰犧雙骼共抵之獸爾雅曰西海有比翼之鳥不比不飛其名鶼東海有比目之魚不比不行名為鰈也鬯黍合其一稃靈茅藉其三脊鄭玄詩傳及禮注云秬鬯即黑黍酒耳鬯者言芬香條暢也秬黑黍一稃二米孫氏瑞應圖曰黃帝時南夷乘白鹿來獻秬鬯漢書郊祀志曰管仲曰江淮之間一茅三脊所以為籍孟康曰所謂靈茅也協風遙扇景化潛流榮鏡八荒財成萬有協風和風也班固典引曰盛哉皇家功居百姓榮鏡宇宙揚雄甘泉賦曰天閫決兮地門開八荒協兮萬國諧易曰財成天地之道也夫以軒皇駕象總會百靈夏禹登山朝宗萬國家語昔禹會諸侯於塗山執玉帛者萬國亦見史記若使觀風展彩鳴鑾珠獸之巖觀風注訖司馬相如封禪書曰展采錯事鳴鑾注訖山海經曰太山有獸焉其狀如豚而有珠環水出焉注於江也發號揚徽瘞玉金雞之岫封禪書曰勒功中嶽以彰至尊舒盛德發號榮班固典引曰將絣萬嗣揚洪輝奮景炎易是類謀曰太山亡金雞西嶽失玉羊鄭玄注曰太山亡金雞也者箕星亡也西嶽失玉羊者狼星失也翠華西轉蒼駕東巡張平子南都賦曰望翠華兮威蕤建太常兮緋緋駟飛龍兮騤騤振和鸞兮京師總萬乘兮徘徊案平路兮來歸豈不思天子南巡之詞哉蒼駕已注訖也創射牛斗之儀起訛麟之祭漢書郊祀志曰與公卿諸生議封禪封禪用希曠絶莫知其儀而群儒采封禪尚書周官王制之望祀射牛事蘇林曰當祭廣射其牲以除不祥臣瓚案射牛示親畝揚雄甘泉賦曰炎感黃龍兮熛訛碩麟祇肅天地允答神人漢書郊祀志曰有司曰陛下肅祇郊祀司馬相如封禪書曰天人之際已交上下相發允答也開封中之白雲望嶺側之青氣漢書郊祀志曰帝上太山下陰道禪肅然有白雲見封中漢武帝故事曰梁父山之上有白雲肅然為蓋應劭漢官儀曰世祖封禪夕有青氣上與天屬遙望不見嶺也作範前古垂裕後昆千年之慶既臻萬歲之音可發謹對漢書郊祀志曰武帝幸緱氏禮登中嶽太室從官在山上聞若有言萬歲之音問上上不言問下下不言乃令祠官加增太室祠也征東夷問風郊未清月營頻偃風謂風夷論語子欲居九夷注東方之夷有九種傳曰畎夷犴夷方夷黃夷伯夷赤夷玄夷風夷陽夷明組之俗長纓罕羈山海經曰朝鮮在列陽東明組居海中漢書終軍傳使南越說其王軍請受長纓必羈南越王致之闕下軍遂往說越王越王聽許請舉國內屬天子大說也雖挫遊魂未除殘孽今欲重飛雲鳥再動環龜太公六韜曰四面有敵若之何曰當為雲鳥之陳司馬兵法曰凡戰背風背高兼舍環龜注曰兼舍者晝夜行四面干戈謂之環龜也橫行遺玉之鄉拓地捐琴之壑山海經曰東海外有青馬三騅爰有遺玉視肉有月母之國中有琴又曰東海之外有大壑曰少昊之國帝顓頊於此棄其琴瑟注曰言今壑中有琴聲漢書曰橫行凶奴中虞丘壽王驃騎論功論曰東越滄海西極河源拓地萬里海內晏然將使占蹄之俗革化而內遷負羽之軍稜威而外蕩魏略曰鮮之俗常用十月飲食歌舞名之曰舞天有軍事祭天煞一牛觀蹄以占吉凶牛蹄解者為凶合者為吉江淹別賦曰若乃邊郡未和負羽從軍遼水無極鴈山參雲也奇正之術應有二權攻取之方佇聞三略淮南子曰兵有三勢二權有氣勢地勢因勢將勇而輕敵卒果敢而樂戰氣如飄風聲如雷電此之謂氣勢狹路津關太山石塞羊腸道魚笱門一人守隘千人不過此之謂地勢因其勞倦飢渴擠其揭揭此之謂因勢善用間諜出於不意使敵人之兵無所適備此謂智權前後不相蹍左右不相干受刃者少傷敵者衆此之謂事權黃石公記兵法之篇有上略中略下略謂之三略也對竊聞風夷畎夷之地獷俗難陶辰韓辨韓之鄉狼心易擾綿歷既久職貢靡修風夷注訖獷戾魏略曰韓在帶方南南與倭接有三種一曰馬韓二曰辰韓三曰辨韓辰韓古之辰國左太沖吳都賦曰職貢納其苞軌狼子野心也成其旅拒之心熾其飛走之路毛詩曰獫狁孔熾走喻禽獸班固東京賦曰飛者未及翔走者未及去遂使荒城狡兔未掛良弓漢書曰元封三年朝鮮斬其王右渠來降遂定真番臨屯樂浪玄兔四郡又朝鮮有玄兔城張顯析言曰言狡獸死良弓藏也絶島奔黥屢迷疏網海曲曰島木玄虛海賦曰若乃橫海奔鯨突兀孤遊茹鱗甲吞龍舟或乃蹭蹬窮波陸死鹽田巨鱗插雲耆獵刺天孔德璋表曰奔鯨妄進故曝括嶼漢書刑法志曰漢初改秦法斫雕為朴破觚為圓兮網漏吞舟之魚老子曰天網恢恢疏而不漏也觀其向背之趣議其姦宄之由良以前王無懷遠之威歷代寡牢籠之略雖窮豎亥之算未越青丘空問海人之衣唯臨滄沼山海經曰帝使豎亥步自東極至於西極五億十選九千八百八步豎亥左手把算右手指青丘北郭璞注山海經曰舊說魏黃初中太守王頎討高句麗盡其東界臨大海問其耆舊海東復有人不云嘗在海中得一布褶身如中人衣兩袖長三丈即長臂人衣也若使聲馳日域化浹天涯則落隼之貢可徵獻狐之賓自至孔子家語曰孔子在陳有隼落於陳侯之庭而死楛矢貫之石砮其長尺有咫惠公使人如孔子館而問焉孔子曰隼之來遠矣此肅慎氏之矢昔武王剋商通九夷百蠻使各以其方賄來貢於是肅慎氏貢楛矢石砮以分太姬配胡公而封諸陳周書王會篇曰成王時青丘獻九尾之狐伏惟聖上以飛天御曆括地開家風清執象之君化軼繞樞之帝懸玉鏡席蘿圖踐三英登九望操環把纓之俗乘蠡卷殼之鄉一臂一目之酋毛人羽人之國莫不踐珠澤跨桑津嚮仁義之風盡梯航之獻願茲遼碣獨阻荒隅未戢五兵猶勞在駕夫以九黎虐政猶興中冀之誅三苗不龔爰動姚墟之伐今既兵承廟略將稟神謀黃鳥降旗玄狐受籙命渡遼之將興轉石之師地陳籠山天船蓋海蒙輪萬隊絡鐵千群旆插雲心鼓鳴雷骨翻日車於糅雪縱烈火於秋原鼇山無作固之基鯨海息群飛之浪鼷頭既截龍膝方回先除衛滿之凶卻掃孫淵之孽靖帶方之氛祲安肅慎之黎元不勞荀彘之謀詎待涉河之說然後置南部之尉朝東海之君掛弓扶桑洗兵海島文馬既放雕弓復韜刊不耐之城勒丸都之岫視六合其如指掌何一隅之足芥哉謹對均州壤問庶土交正垂範前經地利必分騰規往訓由是張衡摛賦辨沃塉於二京裴秀制圖審高卑於六體然則窳隆異等勞逸不同將均貢篚之差實在京坻之積至乃人稀土曠滄瀛有彌望之郊揮汗駕肩汾晉無立錐之地今欲均其土宇任以遷居使戶割膏腴家豐菽粟猶恐首丘難變懷土易安食水多怨讟之謠涉河無率從之誥可否之理應有令圖勸導之宜咸敷厥旨對竊聞人惟邦本本固邦寧務本必於安人基邦在於弘衆譬潭深魚集林茂鳥歸山海不厭於高深家國必資於富實曩者隋網紊緒天下分崩荊棘旅於階庭狐兔踐於城邑我國家纂期膺曆攝運受終逢五老而受圖書獵雙童而基霸主澄清六合榮鏡八荒再讓而天下自歸一戎而兵戈已偃聖上以大明統極提象御辰景化溢於幽遐神功暢於動殖駕雲甄海益地開圖義里恆空閒田莫競猶恐州如馬齒疏密不同地若龍鱗膏腴兼倍將欲均平土宇申畫郊圻以為汾晉黎氓邑居秋隘滄瀛郊野耕墾未周五土之利尚荒四人之利猶褊若夫體國經野訓俗濟時擇利而行應權而動若使廣開敦諭各任遷居咸遵樂土之詩共解薰風之慍使其環桑起宅荷鍤趨疇龍梭曳蠶妾之機鳳粟滿田夫之積然後崇禮節務耕耘政令絶蒼鷹之威聚斂無餓豺之暴即可千倉起詠九賦咸均襁負滿於康莊雞犬聞於郊境謹對
